version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: spend-management-db
    restart: unless-stopped
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: spend-management-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: spend-management-ui
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api
      - vision-api

  ollama:
    image: ollama/ollama
    container_name: spend-management-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c", "/bin/ollama serve & until /bin/ollama list > /dev/null 2>&1; do sleep 2; done && /bin/ollama pull llava && wait"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  vision-api:
    build:
      context: ./vision-api
      dockerfile: Dockerfile
    container_name: spend-management-vision-api
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: llava
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  postgres_data:
  ollama_data:
